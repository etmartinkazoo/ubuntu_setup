# ~/.tmux.conf — managed by ubuntu_setup

# ── prefix: C-a (screen-style) ────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── indexing ──────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── mouse & copy mode (vi) ────────────────────────────────────────
set -g mouse on
set -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# ── history ───────────────────────────────────────────────────────
set -g history-limit 50000

# ── colours / true-colour ─────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g terminal-features "xterm*:clipboard"

# ── status bar ────────────────────────────────────────────────────
set -g status-interval 5
set -g status-position bottom
set -g window-status-format " #I:#W "
set -g window-status-separator ""

# ── intuitive splits ──────────────────────────────────────────────
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# ── vim-style pane navigation ─────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── resize with prefix + C-h/j/k/l ────────────────────────────────
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ── quick reload ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "reloaded"
